<script>
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

var bestScore=+(localStorage.getItem('1942Best')||0);
var MAX_STAGE=32;

// ── 상수 ──
var PLAYER_W=36,PLAYER_H=48;
var BULLET_SPD=14;
var FIRE_RATE=18;
var SCROLL_SPD=2.5;

// ── 상태 ──
var player,bullets,enemies,enemyBullets,items,particles,clouds,explosions;
var score=0,lives=3,stage=1,frame=0;
var gameActive=false;
var fireTimer=0,rollTimer=0,rollCooldown=0;
var stageTimer=0,stageClearDelay=0;
var bossActive=false,bossMaxHp=0;
var touchX=null,touchY=null,lastTX=null,lastTY=null;
var wingmen=[]; // 보조 비행기
var bombs=0;    // 쟁여둔 폭탄 수
var screenShake=0;
var bgY=0;

// ── 스테이지 설정 ──
function getStageConfig(s){
  var isBoss=(s%4===0); // 4스테이지마다 보스
  return{
    isBoss:isBoss,
    enemyRows:isBoss?0:Math.min(2+Math.floor(s/4),5),
    enemyCols:isBoss?0:Math.min(4+Math.floor(s/6),8),
    enemySpd:0.6+s*0.08,
    fireRate:Math.max(40,120-s*3),
    bossHp:isBoss?50+s*15:0,
    waveCount:isBoss?1:2+Math.floor(s/8),
  };
}

// ── 플레이어 ──
function makePlayer(){
  player={
    x:W/2,y:H*0.78,
    w:PLAYER_W,h:PLAYER_H,
    roll:0,rollMax:45,
    shield:0,
    power:1, // 1=기본, 2=와이드, 3=트리플
    missile:0,
    invincible:0,
  };
}

function drawPlayer(){
  if(!player)return;
  ctx.save();
  ctx.translate(player.x,player.y);

  // 무적 깜빡임
  if(player.invincible>0&&Math.floor(player.invincible/5)%2===0){
    ctx.restore();return;
  }

  // 롤 효과
  if(player.roll>0){
    var rollAngle=Math.sin(player.roll/player.rollMax*Math.PI)*0.7;
    ctx.rotate(rollAngle);
    // 롤 중 글로우
    ctx.shadowColor='#0ff';ctx.shadowBlur=20;
  }

  // 실드
  if(player.shield>0){
    ctx.strokeStyle='rgba(0,200,255,0.5)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,0,PLAYER_W*0.9,0,Math.PI*2);ctx.stroke();
  }

  // ── 사보이아 S.21 풍 (붉은 돼지 주인공기) ──
  var s=1;
  var W2=PLAYER_W, H2=PLAYER_H;

  // 엔진 불꽃 (뒤쪽)
  var fh=16+Math.random()*10;
  var fg=ctx.createLinearGradient(0,H2*0.38,0,H2*0.38+fh);
  fg.addColorStop(0,'rgba(255,180,50,0.95)');
  fg.addColorStop(0.5,'rgba(255,80,0,0.7)');
  fg.addColorStop(1,'rgba(255,30,0,0)');
  ctx.fillStyle=fg;
  ctx.beginPath();ctx.ellipse(0,H2*0.42+fh/2,7,fh/2,0,0,Math.PI*2);ctx.fill();

  // 하단 날개 (복엽기 아래 날개)
  var wg2=ctx.createLinearGradient(-W2*0.9,H2*0.25,W2*0.9,H2*0.35);
  wg2.addColorStop(0,'#8B1a1a');wg2.addColorStop(0.5,'#cc2200');wg2.addColorStop(1,'#8B1a1a');
  ctx.fillStyle=wg2;
  ctx.beginPath();
  ctx.moveTo(-W2*0.85,H2*0.28);
  ctx.lineTo(W2*0.85,H2*0.28);
  ctx.lineTo(W2*0.7,H2*0.42);
  ctx.lineTo(-W2*0.7,H2*0.42);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#6B0a0a';ctx.lineWidth=1;ctx.stroke();

  // 상단 날개 (복엽기 위 날개 - 더 넓음)
  var wg1=ctx.createLinearGradient(-W2,H2*-0.05,W2,H2*0.05);
  wg1.addColorStop(0,'#8B1a1a');wg1.addColorStop(0.5,'#cc2200');wg1.addColorStop(1,'#8B1a1a');
  ctx.fillStyle=wg1;
  ctx.beginPath();
  ctx.moveTo(-W2*1.05,H2*-0.02);
  ctx.lineTo(W2*1.05,H2*-0.02);
  ctx.lineTo(W2*0.9,H2*0.14);
  ctx.lineTo(-W2*0.9,H2*0.14);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#6B0a0a';ctx.lineWidth=1;ctx.stroke();

  // 날개 사이 지지대 (복엽기 특징)
  ctx.strokeStyle='#888';ctx.lineWidth=1.5;
  [-W2*0.4,W2*0.4].forEach(function(sx){
    ctx.beginPath();ctx.moveTo(sx,H2*0.08);ctx.lineTo(sx,H2*0.28);ctx.stroke();
  });

  // 동체 (유선형 붉은 몸통)
  var bg=ctx.createLinearGradient(-W2*0.22,-H2*0.5,W2*0.22,H2*0.5);
  bg.addColorStop(0,'#e83030');
  bg.addColorStop(0.3,'#cc1a1a');
  bg.addColorStop(0.7,'#aa1010');
  bg.addColorStop(1,'#880808');
  ctx.fillStyle=bg;
  ctx.shadowColor='rgba(200,0,0,0.4)';ctx.shadowBlur=8;
  ctx.beginPath();
  ctx.moveTo(0,-H2*0.5);          // 기수
  ctx.bezierCurveTo(W2*0.22,-H2*0.4, W2*0.24,-H2*0.1, W2*0.2,H2*0.38);
  ctx.lineTo(W2*0.1,H2*0.5);
  ctx.lineTo(-W2*0.1,H2*0.5);
  ctx.lineTo(-W2*0.2,H2*0.38);
  ctx.bezierCurveTo(-W2*0.24,-H2*0.1, -W2*0.22,-H2*0.4, 0,-H2*0.5);
  ctx.fill();
  ctx.shadowBlur=0;

  // 원형 엔진 (기수 앞)
  var eg=ctx.createRadialGradient(0,-H2*0.42,0,0,-H2*0.42,W2*0.22);
  eg.addColorStop(0,'#ccc');eg.addColorStop(0.6,'#888');eg.addColorStop(1,'#444');
  ctx.fillStyle=eg;
  ctx.beginPath();ctx.arc(0,-H2*0.44,W2*0.22,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.stroke();

  // 프로펠러
  var propAngle=frame*0.3;
  ctx.save();ctx.translate(0,-H2*0.5);ctx.rotate(propAngle);
  ctx.fillStyle='rgba(80,50,20,0.85)';
  [-1,1].forEach(function(d){
    ctx.beginPath();
    ctx.ellipse(0,d*W2*0.32,W2*0.08,W2*0.3,0,0,Math.PI*2);
    ctx.fill();
  });
  ctx.restore();

  // 프로펠러 중심
  ctx.fillStyle='#888';
  ctx.beginPath();ctx.arc(0,-H2*0.5,W2*0.07,0,Math.PI*2);ctx.fill();

  // 조종석 (오픈 콕핏 스타일)
  ctx.fillStyle='rgba(60,120,200,0.7)';
  ctx.beginPath();ctx.ellipse(0,-H2*0.15,W2*0.14,H2*0.12,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(150,200,255,0.5)';ctx.lineWidth=1;ctx.stroke();

  // 조종사 실루엣
  ctx.fillStyle='#2a1a0a';
  ctx.beginPath();ctx.arc(0,-H2*0.2,W2*0.1,0,Math.PI*2);ctx.fill();
  // 고글
  ctx.fillStyle='rgba(100,180,255,0.8)';
  ctx.beginPath();ctx.ellipse(-W2*0.04,-H2*0.2,W2*0.04,W2*0.04,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(W2*0.04,-H2*0.2,W2*0.04,W2*0.04,0,0,Math.PI*2);ctx.fill();

  // 꼬리날개
  ctx.fillStyle='#aa1010';
  ctx.beginPath();
  ctx.moveTo(-W2*0.08,H2*0.38);ctx.lineTo(-W2*0.35,H2*0.28);ctx.lineTo(-W2*0.3,H2*0.45);
  ctx.closePath();ctx.fill();
  ctx.beginPath();
  ctx.moveTo(W2*0.08,H2*0.38);ctx.lineTo(W2*0.35,H2*0.28);ctx.lineTo(W2*0.3,H2*0.45);
  ctx.closePath();ctx.fill();

  // 동체 하이라이트
  ctx.strokeStyle='rgba(255,100,100,0.4)';ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(-W2*0.08,-H2*0.45);
  ctx.bezierCurveTo(-W2*0.18,-H2*0.3,-W2*0.2,0,-W2*0.15,H2*0.3);
  ctx.stroke();

  ctx.shadowBlur=0;
  ctx.restore();
}

// ── 총알 ──
function fireBullet(){
  var p=player.power;
  var bspd=BULLET_SPD;
  if(p===1){
    bullets.push({x:player.x,y:player.y-PLAYER_H/2,vx:0,vy:-bspd,type:'normal'});
  } else if(p===2){
    bullets.push({x:player.x-10,y:player.y-PLAYER_H/3,vx:-0.5,vy:-bspd,type:'normal'});
    bullets.push({x:player.x+10,y:player.y-PLAYER_H/3,vx:0.5,vy:-bspd,type:'normal'});
  } else {
    bullets.push({x:player.x,y:player.y-PLAYER_H/2,vx:0,vy:-bspd,type:'normal'});
    bullets.push({x:player.x-14,y:player.y-PLAYER_H/3,vx:-0.8,vy:-bspd,type:'normal'});
    bullets.push({x:player.x+14,y:player.y-PLAYER_H/3,vx:0.8,vy:-bspd,type:'normal'});
  }
  // 미사일
  if(player.missile>0&&fireTimer%42===0){
    bullets.push({x:player.x,y:player.y-PLAYER_H/2,vx:0,vy:-8,type:'missile'});
    player.missile--;
  }
}

function drawBullet(b){
  ctx.save();
  if(b.type==='missile'){
    // 미사일 - 크고 화려하게
    ctx.shadowColor='#f80';ctx.shadowBlur=18;
    ctx.fillStyle='#f80';
    ctx.beginPath();ctx.roundRect(b.x-6,b.y-14,12,26,4);ctx.fill();
    ctx.fillStyle='#ff0';
    ctx.beginPath();ctx.roundRect(b.x-3,b.y-14,6,18,3);ctx.fill();
    // 미사일 불꽃
    var mf=ctx.createLinearGradient(b.x,b.y+10,b.x,b.y+22);
    mf.addColorStop(0,'rgba(255,120,0,0.9)');mf.addColorStop(1,'rgba(255,50,0,0)');
    ctx.fillStyle=mf;
    ctx.beginPath();ctx.ellipse(b.x,b.y+16,4,8,0,0,Math.PI*2);ctx.fill();
  } else {
    // 일반 총알 - 굵고 밝게
    ctx.shadowColor='#ff4';ctx.shadowBlur=14;
    // 외곽 글로우
    var bg=ctx.createLinearGradient(b.x,b.y+2,b.x,b.y-22);
    bg.addColorStop(0,'rgba(255,220,0,0)');
    bg.addColorStop(0.3,'rgba(255,220,0,0.6)');
    bg.addColorStop(1,'#fff');
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.roundRect(b.x-5,b.y-22,10,22,5);ctx.fill();
    // 중심 밝은 코어
    ctx.fillStyle='#fff';
    ctx.shadowColor='#fff';ctx.shadowBlur=8;
    ctx.beginPath();ctx.roundRect(b.x-2,b.y-20,4,16,2);ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.restore();
}

// ── 적 ──
var ENEMY_TYPES=[
  {w:32,h:28,hp:1,score:100,color:'#4af',glow:'#08f',type:'fighter'},
  {w:38,h:32,hp:2,score:200,color:'#f84',glow:'#f40',type:'bomber'},
  {w:44,h:36,hp:3,score:300,color:'#a4f',glow:'#80f',type:'heavy'},
  {w:28,h:24,hp:1,score:150,color:'#0f8',glow:'#0a4',type:'fast'},
];

var enemyWaves=[];
var currentWave=0,waveTimer=0,waveDelay=180;
var stageEnemiesLeft=0,stageClearing=false;

function buildWaves(){
  var cfg=getStageConfig(stage);
  enemyWaves=[];
  stageClearing=false;
  currentWave=0;
  waveTimer=0;

  if(cfg.isBoss){
    // 보스 웨이브
    enemyWaves.push({type:'boss',hp:cfg.bossHp});
    return;
  }

  for(var w=0;w<cfg.waveCount;w++){
    var wave=[];
    var typeIdx=Math.min(Math.floor(stage/8),3);
    for(var r=0;r<cfg.enemyRows;r++){
      for(var c=0;c<cfg.enemyCols;c++){
        var t=(r===0&&stage>8)?Math.min(typeIdx,2):r<2?1:0;
        if(stage>16&&Math.random()<0.2)t=3;
        wave.push({
          col:c,row:r,
          x:(W/(cfg.enemyCols+1))*(c+1),
          y:-60-r*55-w*30,
          type:t,
          moveDir:w%2===0?1:-1,
          cfg:cfg,
        });
      }
    }
    enemyWaves.push({type:'normal',enemies:wave,delay:w*waveDelay});
  }
  stageEnemiesLeft=enemyWaves.reduce(function(a,w){
    return a+(w.type==='normal'?w.enemies.length:1);
  },0);
}

function spawnWave(){
  if(currentWave>=enemyWaves.length)return;
  var wv=enemyWaves[currentWave];
  if(wv.type==='boss'){
    spawnBoss(wv.hp);
    currentWave++;
    return;
  }
  if(frame>=wv.delay+stageTimer){
    wv.enemies.forEach(function(e){
      var et=ENEMY_TYPES[e.type];
      enemies.push({
        x:e.x,y:e.y,
        w:et.w,h:et.h,
        hp:et.hp,maxHp:et.hp,
        score:et.score*(1+Math.floor(stage/8)),
        color:et.color,glow:et.glow,
        vx:e.cfg.enemySpd*e.moveDir*0.5,
        vy:e.cfg.enemySpd*0.8,
        phase:Math.random()*Math.PI*2,
        fireTimer:Math.floor(Math.random()*e.cfg.fireRate),
        fireRate:e.cfg.fireRate,
        type:et.type,
        isBoss:false,
        hitTimer:0,
        pattern:Math.floor(Math.random()*3),
      });
    });
    currentWave++;
  }
}

function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x,e.y);
  if(e.hitTimer>0){ctx.globalAlpha=0.5+0.5*Math.sin(e.hitTimer*0.5);}

  var ew=e.w, eh=e.h;
  if(e.isBoss){
    // ── 보스기 - 대형 레트로 비행정 풍 ──
    ctx.shadowColor=e.glow;ctx.shadowBlur=25;

    // 하단 플로트 (수상기 느낌)
    ctx.fillStyle='#444';
    [-ew*0.35,ew*0.35].forEach(function(fx){
      ctx.beginPath();
      ctx.ellipse(fx,eh*0.55,ew*0.12,eh*0.08,0,0,Math.PI*2);
      ctx.fill();
    });

    // 하단 날개
    ctx.fillStyle='#8B1a1a';
    ctx.beginPath();
    ctx.moveTo(-ew*0.85,eh*0.15);ctx.lineTo(ew*0.85,eh*0.15);
    ctx.lineTo(ew*0.7,eh*0.32);ctx.lineTo(-ew*0.7,eh*0.32);
    ctx.closePath();ctx.fill();

    // 상단 날개 (더 넓음)
    ctx.fillStyle='#cc1a00';
    ctx.beginPath();
    ctx.moveTo(-ew*1.1,-eh*0.1);ctx.lineTo(ew*1.1,-eh*0.1);
    ctx.lineTo(ew*0.95,eh*0.08);ctx.lineTo(-ew*0.95,eh*0.08);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='#8B0a00';ctx.lineWidth=1.5;ctx.stroke();

    // 날개 지지대
    ctx.strokeStyle='#666';ctx.lineWidth=2;
    [-ew*0.5,-ew*0.2,ew*0.2,ew*0.5].forEach(function(sx){
      ctx.beginPath();ctx.moveTo(sx,eh*0.02);ctx.lineTo(sx,eh*0.15);ctx.stroke();
    });

    // 동체 (굵고 둥근 유선형)
    var bbg=ctx.createLinearGradient(-ew*0.28,-eh*0.55,ew*0.28,eh*0.5);
    bbg.addColorStop(0,'#e83030');bbg.addColorStop(0.4,'#cc1a00');bbg.addColorStop(1,'#770808');
    ctx.fillStyle=bbg;
    ctx.beginPath();
    ctx.ellipse(0,0,ew*0.28,eh*0.52,0,0,Math.PI*2);
    ctx.fill();

    // 엔진 2개
    [-ew*0.4,ew*0.4].forEach(function(ex2){
      ctx.fillStyle='#555';
      ctx.beginPath();ctx.arc(ex2,-eh*0.05,ew*0.13,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#333';
      ctx.beginPath();ctx.arc(ex2,-eh*0.05,ew*0.08,0,Math.PI*2);ctx.fill();
      // 프로펠러
      ctx.save();ctx.translate(ex2,-eh*0.12);ctx.rotate(frame*0.25*(ex2>0?1:-1));
      ctx.fillStyle='rgba(60,40,20,0.9)';
      [-1,1].forEach(function(d){
        ctx.beginPath();ctx.ellipse(0,d*ew*0.2,ew*0.06,ew*0.18,0,0,Math.PI*2);ctx.fill();
      });
      ctx.restore();
    });

    // 조종석 (앞쪽 유리)
    ctx.fillStyle='rgba(50,100,200,0.6)';
    ctx.beginPath();ctx.ellipse(0,-eh*0.28,ew*0.14,eh*0.14,0,0,Math.PI*2);ctx.fill();

    // 꼬리
    ctx.fillStyle='#aa1010';
    ctx.beginPath();
    ctx.moveTo(-ew*0.08,eh*0.42);ctx.lineTo(-ew*0.4,eh*0.28);ctx.lineTo(-ew*0.35,eh*0.52);
    ctx.closePath();ctx.fill();
    ctx.beginPath();
    ctx.moveTo(ew*0.08,eh*0.42);ctx.lineTo(ew*0.4,eh*0.28);ctx.lineTo(ew*0.35,eh*0.52);
    ctx.closePath();ctx.fill();

    // HP바
    var pct=e.hp/e.maxHp;
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.beginPath();ctx.roundRect(-ew*0.4,eh*0.62,ew*0.8,8,4);ctx.fill();
    ctx.fillStyle=pct>0.5?'#0f8':pct>0.25?'#f84':'#f44';
    ctx.beginPath();ctx.roundRect(-ew*0.4,eh*0.62,ew*0.8*pct,8,4);ctx.fill();

  } else {
    // ── 일반 적기 - 소형 레트로 복엽기 ──
    ctx.shadowColor=e.glow;ctx.shadowBlur=10;
    var colors={body:e.color,dark:e.glow,wing:e.color};

    // 하단 날개
    ctx.fillStyle=e.color;ctx.globalAlpha=0.85;
    ctx.beginPath();
    ctx.moveTo(-ew*0.7,eh*0.12);ctx.lineTo(ew*0.7,eh*0.12);
    ctx.lineTo(ew*0.55,eh*0.28);ctx.lineTo(-ew*0.55,eh*0.28);
    ctx.closePath();ctx.fill();

    // 상단 날개 (더 넓음)
    ctx.globalAlpha=1;
    ctx.beginPath();
    ctx.moveTo(-ew*0.85,-eh*0.08);ctx.lineTo(ew*0.85,-eh*0.08);
    ctx.lineTo(ew*0.72,eh*0.08);ctx.lineTo(-ew*0.72,eh*0.08);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle=e.glow;ctx.lineWidth=1;ctx.stroke();

    // 날개 지지대
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.2;
    [-ew*0.3,ew*0.3].forEach(function(sx){
      ctx.beginPath();ctx.moveTo(sx,eh*0.02);ctx.lineTo(sx,eh*0.12);ctx.stroke();
    });

    // 동체
    var dbg=ctx.createLinearGradient(-ew*0.18,-eh*0.5,ew*0.18,eh*0.5);
    dbg.addColorStop(0,'#fff');dbg.addColorStop(0.2,e.color);dbg.addColorStop(1,e.glow);
    ctx.fillStyle=dbg;
    ctx.beginPath();
    ctx.moveTo(0,-eh*0.5);
    ctx.bezierCurveTo(ew*0.18,-eh*0.35,ew*0.18,eh*0.2,ew*0.12,eh*0.48);
    ctx.lineTo(-ew*0.12,eh*0.48);
    ctx.bezierCurveTo(-ew*0.18,eh*0.2,-ew*0.18,-eh*0.35,0,-eh*0.5);
    ctx.fill();

    // 원형 엔진
    ctx.fillStyle='#444';
    ctx.beginPath();ctx.arc(0,-eh*0.42,ew*0.16,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(0,-eh*0.42,ew*0.1,0,Math.PI*2);ctx.fill();

    // 프로펠러
    ctx.save();ctx.translate(0,-eh*0.5);ctx.rotate(frame*0.35);
    ctx.fillStyle='rgba(80,55,25,0.9)';
    [-1,1].forEach(function(d){
      ctx.beginPath();ctx.ellipse(0,d*ew*0.22,ew*0.06,ew*0.2,0,0,Math.PI*2);ctx.fill();
    });
    ctx.restore();

    // 꼬리날개
    ctx.fillStyle=e.color;
    ctx.beginPath();
    ctx.moveTo(-ew*0.07,eh*0.38);ctx.lineTo(-ew*0.28,eh*0.24);ctx.lineTo(-ew*0.24,eh*0.46);
    ctx.closePath();ctx.fill();
    ctx.beginPath();
    ctx.moveTo(ew*0.07,eh*0.38);ctx.lineTo(ew*0.28,eh*0.24);ctx.lineTo(ew*0.24,eh*0.46);
    ctx.closePath();ctx.fill();

    ctx.shadowBlur=0;
  }
  ctx.shadowBlur=0;
  ctx.restore();
}

// hex → rgba 변환
function hexRgba(hex, alpha) {
  hex = hex.replace('#','');
  if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r=parseInt(hex.substr(0,2),16);
  var g=parseInt(hex.substr(2,2),16);
  var b=parseInt(hex.substr(4,2),16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}
// ── 효과음 ──
var sfxCtx=null;
function getSfx(){
  if(!sfxCtx)try{sfxCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  if(sfxCtx&&sfxCtx.state==='suspended')sfxCtx.resume();
  return sfxCtx;
}
function sfxShoot(){
  var ac=getSfx();if(!ac)return;
  try{
    var t=ac.currentTime;
    // 메인 발사음
    var o1=ac.createOscillator(),g1=ac.createGain();
    o1.connect(g1);g1.connect(ac.destination);
    o1.type='square';
    o1.frequency.setValueAtTime(1200,t);
    o1.frequency.exponentialRampToValueAtTime(400,t+0.08);
    g1.gain.setValueAtTime(0.15,t);
    g1.gain.exponentialRampToValueAtTime(0.001,t+0.09);
    o1.start(t);o1.stop(t+0.1);
    // 짧은 노이즈 (발사 질감)
    var buf=ac.createBuffer(1,Math.floor(ac.sampleRate*0.04),ac.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.3);
    var src=ac.createBufferSource();src.buffer=buf;
    var gn=ac.createGain();
    gn.gain.setValueAtTime(0.1,t);
    gn.gain.exponentialRampToValueAtTime(0.001,t+0.04);
    src.connect(gn);gn.connect(ac.destination);
    src.start(t);src.stop(t+0.05);
  }catch(e){}
}
function sfxExplode(big){
  var ac=getSfx();if(!ac)return;
  try{
    var t=ac.currentTime,dur=big?0.5:0.2;
    var buf=ac.createBuffer(1,Math.floor(ac.sampleRate*dur),ac.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,big?0.4:0.7);
    var src=ac.createBufferSource();src.buffer=buf;
    var fl=ac.createBiquadFilter();fl.type='lowpass';fl.frequency.value=big?500:300;
    var g=ac.createGain();g.gain.setValueAtTime(big?0.6:0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.connect(fl);fl.connect(g);g.connect(ac.destination);
    src.start(t);src.stop(t+dur+0.05);
  }catch(e){}
}
function sfxItem(){
  var ac=getSfx();if(!ac)return;
  try{
    var t=ac.currentTime;
    [523,659,784].forEach(function(f,i){
      var o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0.14,t+i*0.05);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.05+0.18);
      o.start(t+i*0.05);o.stop(t+i*0.05+0.2);
    });
  }catch(e){}
}
function sfxRoll(){
  var ac=getSfx();if(!ac)return;
  try{
    var t=ac.currentTime;
    var o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(880,t+0.15);
    g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
    o.start(t);o.stop(t+0.22);
  }catch(e){}
}
function sfxStageClear(){
  var ac=getSfx();if(!ac)return;
  try{
    var t=ac.currentTime;
    [523,659,784,1047,1319].forEach(function(f,i){
      var o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0.18,t+i*0.09);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.09+0.28);
      o.start(t+i*0.09);o.stop(t+i*0.09+0.3);
    });
  }catch(e){}
}
function sfxHit(){
  var ac=getSfx();if(!ac)return;
  try{
    var t=ac.currentTime;
    var o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(50,t+0.4);
    g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    o.start(t);o.stop(t+0.42);
  }catch(e){}
}
function sfxBossAppear(){
  var ac=getSfx();if(!ac)return;
  try{
    var t=ac.currentTime;
    [80,100,60].forEach(function(f,i){
      var o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.type='sawtooth';o.frequency.value=f;
      g.gain.setValueAtTime(0.25,t+i*0.2);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.2+0.4);
      o.start(t+i*0.2);o.stop(t+i*0.2+0.42);
    });
  }catch(e){}
}


// ── 보조기 ──
function updateDrawWingmen(){
  for(var i=wingmen.length-1;i>=0;i--){
    var wm=wingmen[i];
    wm.anim+=0.05;
    var tx=player.x+wm.offsetX;
    var ty=player.y+wm.offsetY+Math.sin(wm.anim)*6;

    // 발사
    wm.fireTimer++;
    if(wm.fireTimer>=FIRE_RATE*1.5){
      wm.fireTimer=0;
      bullets.push({x:tx,y:ty-20,vx:0,vy:-BULLET_SPD,type:'normal'});
    }

    // 그리기 (소형 복엽기)
    ctx.save();
    ctx.translate(tx,ty);
    ctx.shadowColor='#aef';ctx.shadowBlur=8;

    // 날개
    ctx.fillStyle='rgba(150,220,255,0.85)';
    ctx.beginPath();
    ctx.moveTo(-18,-2);ctx.lineTo(18,-2);ctx.lineTo(14,8);ctx.lineTo(-14,8);
    ctx.closePath();ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-14,-10);ctx.lineTo(14,-10);ctx.lineTo(11,-2);ctx.lineTo(-11,-2);
    ctx.closePath();ctx.fill();

    // 동체
    var wg=ctx.createLinearGradient(-6,-18,6,16);
    wg.addColorStop(0,'#cef');wg.addColorStop(1,'#6af');
    ctx.fillStyle=wg;
    ctx.beginPath();
    ctx.moveTo(0,-18);
    ctx.bezierCurveTo(7,-12,7,8,5,16);
    ctx.lineTo(-5,16);
    ctx.bezierCurveTo(-7,8,-7,-12,0,-18);
    ctx.fill();

    // 엔진
    ctx.fillStyle='#555';
    ctx.beginPath();ctx.arc(0,-14,5,0,Math.PI*2);ctx.fill();

    // 프로펠러
    ctx.save();ctx.translate(0,-18);ctx.rotate(frame*0.4);
    ctx.fillStyle='rgba(60,40,20,0.9)';
    ctx.beginPath();ctx.ellipse(0,-8,3,8,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(0,8,3,8,0,0,Math.PI*2);ctx.fill();
    ctx.restore();

    // 불꽃
    var ff=ctx.createLinearGradient(0,14,0,24);
    ff.addColorStop(0,'rgba(100,200,255,0.8)');ff.addColorStop(1,'rgba(50,100,255,0)');
    ctx.fillStyle=ff;
    ctx.beginPath();ctx.ellipse(0,19,3,6,0,0,Math.PI*2);ctx.fill();

    ctx.shadowBlur=0;
    ctx.restore();
  }
}
// ── 메인 루프 ──
function loop(){
  requestAnimationFrame(loop);
  frame++;

  // 화면 흔들림
  var sx=0,sy=0;
  if(screenShake>0){
    sx=(Math.random()-0.5)*screenShake*2;
    sy=(Math.random()-0.5)*screenShake*2;
    screenShake=Math.max(0,screenShake-1);
    ctx.save();ctx.translate(sx,sy);
  }

  ctx.clearRect(0,0,W,H);
  drawBg();

  if(!gameActive){if(screenShake>0)ctx.restore();return;}

  // 플레이어 이동 (드래그)
  if(touchX!==null&&lastTX!==null){
    player.x+=(touchX-lastTX)*1.1;
    player.y+=(touchY-lastTY)*1.1;
    lastTX=touchX;lastTY=touchY;
  }
  player.x=Math.max(PLAYER_W/2,Math.min(W-PLAYER_W/2,player.x));
  player.y=Math.max(PLAYER_H/2,Math.min(H-PLAYER_H/2,player.y));

  // 롤
  if(player.roll>0)player.roll--;
  if(rollCooldown>0){
    rollCooldown--;
    document.getElementById('roll-cooldown').textContent=Math.ceil(rollCooldown/60)+'s';
  } else {
    document.getElementById('roll-cooldown').textContent='준비!';
  }

  // 실드/무적
  if(player.shield>0)player.shield--;
  if(player.invincible>0)player.invincible--;

  // 발사
  fireTimer++;
  if(fireTimer>=FIRE_RATE){
    fireTimer=0;fireBullet();
    sfxShoot();
  }

  // 웨이브 스폰
  spawnWave();

  // 총알 업데이트
  for(var i=bullets.length-1;i>=0;i--){
    var b=bullets[i];
    b.x+=b.vx;b.y+=b.vy;
    if(b.y<-20||b.x<-20||b.x>W+20){bullets.splice(i,1);continue;}
    drawBullet(b);
  }

  // 적 총알 업데이트
  for(var i=enemyBullets.length-1;i>=0;i--){
    var eb=enemyBullets[i];
    eb.x+=eb.vx;eb.y+=eb.vy;
    if(eb.y>H+20||eb.x<-20||eb.x>W+20){enemyBullets.splice(i,1);continue;}
    // 플레이어 피격
    if(player.invincible<=0&&player.roll<=0&&
       rectsHit(eb.x,eb.y,eb.boss?12:8,eb.boss?20:14,player.x,player.y,PLAYER_W*0.65,PLAYER_H*0.65)){
      enemyBullets.splice(i,1);
      hitPlayer();continue;
    }
    drawEnemyBullet(eb);
  }

  // 적 업데이트
  for(var i=enemies.length-1;i>=0;i--){
    var e=enemies[i];
    e.phase+=0.03;
    if(e.hitTimer>0)e.hitTimer--;

    if(e.isBoss){
      // 보스 이동
      if(!e.reachedPos){
        e.y+=e.vy;
        if(e.y>=H*0.2){e.reachedPos=true;e.vy=0;sfxBossAppear();}
      } else {
        e.x=W/2+Math.sin(e.phase*0.5)*W*0.35;
        e.y=H*0.2+Math.sin(e.phase*0.3)*H*0.06;
      }
      updateBossHp(e);
    } else {
      // 일반 적 이동
      e.x+=e.vx+Math.sin(e.phase)*1.5;
      e.y+=e.vy;
      if(e.x<e.w/2||e.x>W-e.w/2)e.vx*=-1;
      if(e.y>H+60){enemies.splice(i,1);continue;}
    }

    // 적 발사
    e.fireTimer--;
    if(e.fireTimer<=0){
      e.fireTimer=e.fireRate+Math.floor(Math.random()*e.fireRate*0.5);
      var dx=player.x-e.x,dy=player.y-e.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      var shots=e.isBoss?5:1;
      for(var s=0;s<shots;s++){
        var spread=e.isBoss?(s-2)*0.2:0;
        var spd=e.isBoss?5:3.5+stage*0.08;
        enemyBullets.push({x:e.x,y:e.y,vx:dx/dist*spd+spread,vy:dy/dist*spd,boss:e.isBoss});
      }
    }

    // 플레이어와 충돌
    if(player.invincible<=0&&player.roll<=0&&
       rectsHit(e.x,e.y,e.w*0.7,e.h*0.7,player.x,player.y,PLAYER_W*0.6,PLAYER_H*0.6)){
      if(player.shield>0){
        player.shield=0;addExplosion(e.x,e.y,e.color,false);
        if(!e.isBoss){enemies.splice(i,1);}
      } else {
        hitPlayer();
      }
    }

    drawEnemy(e);
  }

  // 총알 vs 적
  for(var bi=bullets.length-1;bi>=0;bi--){
    var b=bullets[bi];
    var hit=false;
    for(var ei=enemies.length-1;ei>=0;ei--){
      var e=enemies[ei];
      if(rectsHit(b.x,b.y,b.type==='missile'?10:6,b.type==='missile'?24:20,e.x,e.y,e.w*0.8,e.h*0.8)){
        var dmg=b.type==='missile'?5:1;
        e.hp-=dmg;e.hitTimer=8;hit=true;
        if(e.hp<=0){
          score+=e.score;
          addExplosion(e.x,e.y,e.color,e.isBoss);
          sfxExplode(e.isBoss);
          // 아이템 드롭
          if(Math.random()<(e.isBoss?1:0.3)){
            items.push({x:e.x,y:e.y,vy:2,def:pickItemDef(),anim:0});
          }
          if(e.isBoss){
            bossActive=false;
            document.getElementById('boss-wrap').style.display='none';
          }
          enemies.splice(ei,1);
          stageEnemiesLeft--;
          updateScore();
        }
        break;
      }
    }
    if(hit)bullets.splice(bi,1);
  }

  // 아이템 업데이트
  for(var i=items.length-1;i>=0;i--){
    var it=items[i];
    it.y+=it.vy;
    if(it.y>H+30){items.splice(i,1);continue;}
    if(rectsHit(it.x,it.y,24,24,player.x,player.y,PLAYER_W,PLAYER_H)){
      applyItem(it.def);items.splice(i,1);continue;
    }
    drawItem(it);
  }

  // 파티클
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.vx*=0.97;p.life-=0.022;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0,p.sz*p.life),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // 폭발 링
  for(var i=explosions.length-1;i>=0;i--){
    var ex=explosions[i];
    ex.r+=ex.maxR*0.08;ex.life-=0.06;
    if(ex.life<=0){explosions.splice(i,1);continue;}
    ctx.globalAlpha=ex.life*0.5;
    ctx.strokeStyle=ex.color;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2);ctx.stroke();
  }
  ctx.globalAlpha=1;

  updateDrawWingmen();
  drawPlayer();

  // 스테이지 클리어 체크
  if(!stageClearing&&enemies.length===0&&currentWave>=enemyWaves.length&&!bossActive){
    stageClearing=true;
    stageClearDelay=120;
    sfxStageClear();
    if(stage===MAX_STAGE){
      // 엔딩!
      setTimeout(function(){showEnding();},1500);
    } else {
      showStageBanner('STAGE '+(stage)+' CLEAR!');
    }
  }
  if(stageClearing&&stage<MAX_STAGE){
    stageClearDelay--;
    if(stageClearDelay<=0){
      stage++;
      nextStage();
    }
  }

  // 롤 쿨다운 표시
  document.getElementById('roll-btn').style.opacity=rollCooldown>0?'0.4':'1';

  if(screenShake>0)ctx.restore();
}

function hitPlayer(){
  if(player.invincible>0)return;
  sfxHit();
  addExplosion(player.x,player.y,'#4af',true);
  lives--;
  player.invincible=120;
  player.power=Math.max(1,player.power-1);
  player.shield=0;
  if(wingmen.length>0)wingmen.pop();
  updateHUD();
  if(lives<=0)setTimeout(endGame,600);
}

function nextStage(){
  stageClearing=false;
  bullets=[];enemyBullets=[];items=[];
  bossActive=false;
  document.getElementById('boss-wrap').style.display='none';
  stageTimer=frame;
  updateHUD();
  buildWaves();
  showStageBanner('STAGE '+stage);
  var cfg=getStageConfig(stage);
  if(cfg.isBoss)sfxBossAppear();
}

function showEnding(){
  gameActive=false;
  var isNew=score>bestScore;
  if(isNew){bestScore=score;localStorage.setItem('1942Best',bestScore);}
  document.getElementById('ov-score').textContent=score;
  document.getElementById('ov-score').style.display='block';
  document.getElementById('ov-score-lbl').style.display='block';
  document.querySelector('.ov-title').textContent='🎖️ 임무 완료!';
  document.querySelector('.ov-sub').textContent='32스테이지를 모두 클리어했습니다!\n전설의 에이스가 되었습니다!';
  document.getElementById('ov-best').textContent=isNew?'🏆 신기록!':'최고: '+bestScore+'점';
  document.getElementById('ov-best').style.display='block';
  document.getElementById('ov-stage').textContent='32/32 스테이지 완전 클리어! ✈️';
  document.getElementById('ov-stage').style.display='block';
  document.getElementById('play-btn').textContent='다시 출격!';
  document.getElementById('play-btn').style.background='linear-gradient(135deg,#ff0,#f80)';
  document.getElementById('overlay').style.display='flex';
}

function endGame(){
  gameActive=false;
  var isNew=score>bestScore;
  if(isNew){bestScore=score;localStorage.setItem('1942Best',bestScore);}
  document.getElementById('ov-score').textContent=score;
  document.getElementById('ov-score').style.display='block';
  document.getElementById('ov-score-lbl').style.display='block';
  document.querySelector('.ov-title').textContent='격추됨';
  document.querySelector('.ov-sub').textContent='다시 도전하세요!';
  document.getElementById('ov-best').textContent=isNew?'🏆 신기록!':'최고: '+bestScore+'점';
  document.getElementById('ov-best').style.display='block';
  document.getElementById('ov-stage').textContent='STAGE '+stage+'/32 도달';
  document.getElementById('ov-stage').style.display='block';
  document.getElementById('play-btn').textContent='다시 출격!';
  document.getElementById('play-btn').style.background='linear-gradient(135deg,#f80,#f44)';
  document.getElementById('overlay').style.display='flex';
}

function startGame(){
  var ac=getSfx();
  if(ac&&ac.state==="suspended")ac.resume();
  score=0;lives=3;stage=1;frame=0;fireTimer=0;rollCooldown=0;
  bullets=[];enemies=[];enemyBullets=[];items=[];particles=[];explosions=[];
  wingmen=[];bombs=0;
  bossActive=false;screenShake=0;stageClearing=false;
  updateBombUI();
  document.getElementById('boss-wrap').style.display='none';
  document.querySelector('.ov-title').textContent='1942 REBORN';
  document.querySelector('.ov-sub').textContent='태평양 상공을 누비며 32스테이지를 돌파하라!';
  document.getElementById('ov-score').style.display='none';
  document.getElementById('ov-score-lbl').style.display='none';
  document.getElementById('ov-best').style.display='none';
  document.getElementById('ov-stage').style.display='none';
  document.getElementById('play-btn').textContent='출격!';
  document.getElementById('play-btn').style.background='linear-gradient(135deg,#f80,#f44)';
  document.getElementById('overlay').style.display='none';
  makePlayer();
  initBg();
  updateHUD();
  stageTimer=0;
  buildWaves();
  showStageBanner('STAGE 1');
  gameActive=true;
}

// ── 입력 ──
function addEL(el,ev,fn,opts){if(el)el.addEventListener(ev,fn,opts||false);}

addEL(canvas,'touchstart',function(e){
  e.preventDefault();
  touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;
  lastTX=touchX;lastTY=touchY;
},{passive:false});
addEL(canvas,'touchmove',function(e){
  e.preventDefault();
  touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;
},{passive:false});
addEL(canvas,'touchend',function(e){
  e.preventDefault();
  touchX=null;touchY=null;lastTX=null;lastTY=null;
},{passive:false});

// 마우스
addEL(canvas,'mousemove',function(e){
  if(!gameActive)return;
  if(lastTX!==null){touchX=e.clientX;touchY=e.clientY;}
},false);
addEL(canvas,'mousedown',function(e){
  touchX=e.clientX;touchY=e.clientY;lastTX=touchX;lastTY=touchY;
},false);
addEL(window,'mouseup',function(){
  touchX=null;touchY=null;lastTX=null;lastTY=null;
},false);

// 롤 버튼
addEL(document.getElementById('roll-btn'),'touchstart',function(e){e.preventDefault();e.stopPropagation();},{passive:false});
addEL(document.getElementById('roll-btn'),'touchend',function(e){e.preventDefault();e.stopPropagation();if(gameActive)doRoll();},{passive:false});
addEL(document.getElementById('roll-btn'),'click',function(){if(gameActive)doRoll();},false);

// 폭탄 버튼
addEL(document.getElementById('bomb-btn'),'touchstart',function(e){e.preventDefault();e.stopPropagation();},{passive:false});
addEL(document.getElementById('bomb-btn'),'touchend',function(e){e.preventDefault();e.stopPropagation();if(gameActive)useBomb();},{passive:false});
addEL(document.getElementById('bomb-btn'),'click',function(){if(gameActive)useBomb();},false);

// 키보드
addEL(window,'keydown',function(e){
  if(!gameActive)return;
  var spd=6;
  if(e.key==='ArrowLeft') player.x-=spd;
  if(e.key==='ArrowRight') player.x+=spd;
  if(e.key==='ArrowUp') player.y-=spd;
  if(e.key==='ArrowDown') player.y+=spd;
  if(e.key===' ') doRoll();
  if(e.key==='b'||e.key==='B') useBomb();
},false);

// 시작 버튼
var playBtn=document.getElementById('play-btn');
var btnTouched=false;
addEL(playBtn,'touchstart',function(e){e.preventDefault();e.stopPropagation();},false);
addEL(playBtn,'touchend',function(e){
  e.preventDefault();e.stopPropagation();
  btnTouched=true;startGame();
  setTimeout(function(){btnTouched=false;},600);
},false);
addEL(playBtn,'click',function(){if(btnTouched)return;startGame();},false);

// 초기 배열 세팅
bullets=[]; enemies=[]; enemyBullets=[]; items=[];
particles=[]; explosions=[]; clouds=[]; bgWaves=[];
enemyWaves=[];
initBg();
loop();
</script>
